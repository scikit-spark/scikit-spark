version: "3"

tasks:
  test:fast:
    desc: Run the test suite against the local Python/Spark environment
    env:
      PYSPARK_PYTHON:
        sh: which python
    cmds:
      - pytest --disable-warnings -vv -rxXs python/test

  test:act:
    desc: Run the full CI pipeline locally in Docker via act (image pinned in .actrc)
    cmds:
      - act
