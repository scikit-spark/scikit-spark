name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target for this manual run"
        type: choice
        default: testpypi
        options:
          - testpypi
          - pypi

jobs:
  tests:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        # broaden coverage to add new versions or reproduce bugs
        python-version: ["3.11"]
        pyspark-version: ["3.5.2"]
        java-version: ["11"]
        sklearn-version: ["1.1.3", "1.2.2", "1.3.2", "1.4.2", "1.5.2", "1.6.1", "1.7.1", "1.8.0"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: ${{ matrix.java-version }}
          distribution: adopt

      # Use a per-job virtualenv so concurrent matrix jobs get isolated
      # site-packages. Under `act`, same-Python jobs otherwise share one cached
      # toolcache and clobber each other's pyspark jars mid-run. Adding it to
      # GITHUB_PATH makes every later step's pip/pytest resolve to this venv.
      - name: Create virtualenv
        run: |
          python -m venv .venv
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Install pyspark
        run: pip install pyspark==${{ matrix.pyspark-version }}

      - name: Install test requirements
        run: pip install -r requirements-tests.txt

      - name: Install skspark
        run: pip install .

      # Override whatever scikit-learn the loosened install_requires resolved
      # with the exact version under test for this matrix row.
      - name: Pin scikit-learn under test
        run: pip install scikit-learn==${{ matrix.sklearn-version }}

      - name: Run tests (pytest)
        run: pytest --disable-warnings -vv -rxXs python/test

  # Dev release: every push to master publishes a unique dev build to TestPyPI
  # as a packaging smoke test. github.run_number is monotonic so versions never
  # collide.
  publish-testpypi:
    needs: tests
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi')
    runs-on: ubuntu-24.04
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: pip install build twine

      - name: Compute dev version and rewrite pyproject.toml
        run: |
          BASE=$(grep -E '^version = ' pyproject.toml | head -1 | sed -E 's/version = "(.*)"/\1/')
          DEV_VERSION="${BASE}.dev${{ github.run_number }}"
          echo "Building TestPyPI dev version: $DEV_VERSION"
          sed -i -E "s/^version = \".*\"/version = \"${DEV_VERSION}\"/" pyproject.toml

      - name: Build
        run: python -m build

      - name: Check
        run: twine check dist/*

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # Production release: manual trigger only. Reads the version from
  # pyproject.toml, validates it is unreleased, tags, publishes to PyPI, and
  # cuts a GitHub Release. Everything reversible happens before the irreversible
  # PyPI publish.
  publish-pypi:
    needs: tests
    if: >-
      github.event_name == 'workflow_dispatch' && inputs.target == 'pypi' &&
      github.ref == 'refs/heads/master'
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: pip install build twine

      - name: Read version from pyproject.toml
        id: version
        run: |
          VERSION=$(grep -E '^version = ' pyproject.toml | head -1 | sed -E 's/version = "(.*)"/\1/')
          echo "Releasing version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # Fail fast before doing anything irreversible: the tag must not exist and
      # the version must not already be on PyPI (404 == not yet released).
      - name: Validate version is unreleased
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if git rev-parse -q --verify "refs/tags/v$VERSION" >/dev/null; then
            echo "::error::Tag v$VERSION already exists" >&2
            exit 1
          fi
          CODE=$(curl -s -o /dev/null -w '%{http_code}' "https://pypi.org/pypi/scikit-spark/$VERSION/json")
          if [ "$CODE" != "404" ]; then
            echo "::error::scikit-spark $VERSION already on PyPI (HTTP $CODE)" >&2
            exit 1
          fi

      - name: Build
        run: python -m build

      - name: Check
        run: twine check dist/*

      - name: Extract changelog notes
        id: notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Pull the "# $VERSION" section out of changelog.md, up to the next "# " heading.
          awk -v ver="$VERSION" '
            $0 == "# " ver {grab=1; next}
            grab && /^# / {exit}
            grab {print}
          ' changelog.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No changelog section for $VERSION; falling back to autogenerated notes"
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_notes=true" >> "$GITHUB_OUTPUT"
          fi

      # Tag is reversible (delete + re-run if a later step fails); push it before
      # the irreversible PyPI publish so the release is anchored to a commit.
      - name: Create and push tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ "${{ steps.notes.outputs.has_notes }}" = "true" ]; then
            gh release create "v$VERSION" --title "v$VERSION" --notes-file release-notes.md dist/*
          else
            gh release create "v$VERSION" --title "v$VERSION" --generate-notes dist/*
          fi
